<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THB Communications Manager</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 1.2rem; }
        textarea { width: 100%; box-sizing: border-box; padding: 8px; font-size: 1rem; resize: vertical; }
        button { margin-top: 10px; padding: 8px 16px; font-size: 1rem; cursor: pointer; }
        #counter { font-size: 0.85rem; color: #666; text-align: right; }
        #counter.over { color: #c00; }
        #result { margin-top: 16px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
    </style>
</head>

<body>

    <h1>Send text to viewer</h1>
    <textarea id="text" rows="4" maxlength="255" placeholder="Enter text (max 255 characters)"></textarea>
    <div id="counter">0 / 255</div>
    <button id="send">Send</button>
    <div id="result"></div>

    <script>
        const textEl = document.getElementById('text');
        const counterEl = document.getElementById('counter');
        const resultEl = document.getElementById('result');
        const sendBtn = document.getElementById('send');

        textEl.addEventListener('input', () => {
            const len = textEl.value.length;
            counterEl.textContent = `${len} / 255`;
            counterEl.classList.toggle('over', len > 255);
        });

        sendBtn.addEventListener('click', async () => {
            const text = textEl.value.slice(0, 255);
            data = JSON.stringify({ text });
            resultEl.textContent = 'Sending...';
            try {
                const res = await fetch('/setlabor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Content-Length': data.length },
                    body: data
                });
                const body = await res.text();
                resultEl.textContent = `Status: ${res.status}\n${body}`;
            } catch (err) {
                resultEl.textContent = `Error: ${err.message}`;
            }
        });
        
    </script>
</body>
</html>
